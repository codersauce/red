name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag name to release"
        required: true
  release:
    types:
      - published

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: github.event_name != 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release archive (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          archive_root="release/red-${{ matrix.target }}"
          mkdir -p "$archive_root"
          cp "target/${{ matrix.target }}/release/red" "$archive_root/"
          cp "target/${{ matrix.target }}/release/red_openai_acp" "$archive_root/"
          cp "target/${{ matrix.target }}/release/red_codex_acp" "$archive_root/"
          cp README.md LICENSE default_config.toml "$archive_root/"
          tar -C "$archive_root" -czf "red-${{ matrix.target }}.tar.gz" .

      - name: Prepare release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveRoot = "release/red-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $archiveRoot
          Copy-Item "target/${{ matrix.target }}/release/red.exe" $archiveRoot
          Copy-Item "target/${{ matrix.target }}/release/red_openai_acp.exe" $archiveRoot
          Copy-Item "target/${{ matrix.target }}/release/red_codex_acp.exe" $archiveRoot
          Copy-Item README.md,LICENSE,default_config.toml $archiveRoot
          Compress-Archive -Path "$archiveRoot/*" -DestinationPath "red-${{ matrix.target }}.zip" -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: red-${{ matrix.target }}
          path: red-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  smoke:
    name: Smoke ${{ matrix.target }}
    if: github.event_name != 'release'
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: red
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: red
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: red
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: red.exe

    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: red-${{ matrix.target }}
          path: dist

      - name: Extract and verify release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir extracted
          tar -xzf "dist/red-${{ matrix.target }}.${{ matrix.archive }}" -C extracted
          test -x ./extracted/red_openai_acp
          test -x ./extracted/red_codex_acp
          ./extracted/red_openai_acp --version
          ./extracted/red_codex_acp --version
          output="$(NO_COLOR=1 ./extracted/${{ matrix.binary }} --self-check)"
          final_line="$(printf '%s\n' "$output" | tail -n 1)"
          if [[ "$final_line" != "red self-check ok" ]]; then
            printf 'unexpected self-check output:\n%s\n' "$output" >&2
            exit 1
          fi
          if printf '%s\n' "$output" | grep -Eq '^plugin .+: (pending|disabled|quarantined|active \(reload rejected\)|error.*)$'; then
            printf 'self-check reported an unhealthy plugin:\n%s\n' "$output" >&2
            exit 1
          fi
          for binary in "extracted/${{ matrix.binary }}" extracted/red_openai_acp extracted/red_codex_acp; do
            if grep -aFq "$GITHUB_WORKSPACE" "$binary"; then
              echo "release binary contains its build workspace path: $binary" >&2
              exit 1
            fi
          done

      - name: Extract and verify release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Expand-Archive "dist/red-${{ matrix.target }}.${{ matrix.archive }}" extracted
          if (-not (Test-Path ".\extracted\red_openai_acp.exe" -PathType Leaf)) {
            throw "release archive is missing red_openai_acp.exe"
          }
          if (-not (Test-Path ".\extracted\red_codex_acp.exe" -PathType Leaf)) {
            throw "release archive is missing red_codex_acp.exe"
          }
          & ".\extracted\red_openai_acp.exe" --version
          if ($LASTEXITCODE -ne 0) {
            throw "red_openai_acp --version exited with $LASTEXITCODE"
          }
          & ".\extracted\red_codex_acp.exe" --version
          if ($LASTEXITCODE -ne 0) {
            throw "red_codex_acp --version exited with $LASTEXITCODE"
          }
          $env:NO_COLOR = "1"
          $output = @(& ".\extracted\${{ matrix.binary }}" --self-check)
          if ($LASTEXITCODE -ne 0) {
            throw "self-check exited with $LASTEXITCODE"
          }
          if ($output.Count -eq 0 -or $output[-1] -ne "red self-check ok") {
            throw "unexpected self-check output: $($output -join [Environment]::NewLine)"
          }
          $unhealthy = @($output | Where-Object { $_ -match '^plugin .+: (pending|disabled|quarantined|active \(reload rejected\)|error.*)$' })
          if ($unhealthy.Count -ne 0) {
            throw "self-check reported an unhealthy plugin: $($unhealthy -join ', ')"
          }
          foreach ($binary in @("extracted\${{ matrix.binary }}", "extracted\red_openai_acp.exe", "extracted\red_codex_acp.exe")) {
            $bytes = [System.IO.File]::ReadAllBytes($binary)
            $contents = [System.Text.Encoding]::ASCII.GetString($bytes)
            if ($contents.Contains($env:GITHUB_WORKSPACE)) {
              throw "release binary contains its build workspace path: $binary"
            }
          }

  publish:
    name: Publish draft release
    if: github.event_name != 'release'
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release changelog
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          package_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "red") | .version')"
          test "$package_version" = "$version"
          awk -v heading="## [$version]" '
            index($0, heading) == 1 { found = 1 }
            found && /^## \[/ && index($0, heading) != 1 { exit }
            found { print }
          ' CHANGELOG.md > release-changes.md
          test -s release-changes.md

      - name: Regenerate release changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          version: v2.13.1
          config: cliff.toml
          args: --current --strip all
        env:
          OUTPUT: generated-release-changes.md

      - name: Verify committed release changelog
        shell: bash
        run: |
          set -euo pipefail
          normalize_markdown() {
            awk '
              NF {
                if (pending_blank && wrote) print ""
                print
                wrote = 1
                pending_blank = 0
                next
              }
              wrote { pending_blank = 1 }
            ' "$1"
          }
          normalize_markdown release-changes.md > normalized-release-changes.md
          normalize_markdown generated-release-changes.md > normalized-generated-release-changes.md
          diff -u normalized-release-changes.md normalized-generated-release-changes.md

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum red-* > SHA256SUMS.txt

      - name: Prepare release metadata
        id: release
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          version="${tag#v}"
          prerelease_flag=""
          if [[ "$tag" == *alpha* || "$tag" == *beta* || "$tag" == *rc* ]]; then
            prerelease_flag="--prerelease"
          fi

          previous_tag="$(git tag --sort=-version:refname | grep -v "^${tag}$" | head -n 1 || true)"
          changelog_url="https://github.com/${{ github.repository }}/commits/${tag}"
          if [[ -n "$previous_tag" ]]; then
            changelog_url="https://github.com/${{ github.repository }}/compare/${previous_tag}...${tag}"
          fi

          {
          cat release-changes.md
          cat <<EOF

          ## Installation

          ### Homebrew

          \`\`\`bash
          brew install codersauce/tap/red
          \`\`\`

          ### macOS

          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${tag}/red-aarch64-apple-darwin.tar.gz | tar xz
          chmod +x red red_openai_acp red_codex_acp
          sudo mv red red_openai_acp red_codex_acp /usr/local/bin/
          \`\`\`

          ### Linux

          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${tag}/red-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x red red_openai_acp red_codex_acp
          sudo mv red red_openai_acp red_codex_acp /usr/local/bin/
          \`\`\`

          ### Windows

          Download \`red-x86_64-pc-windows-msvc.zip\`, extract \`red.exe\`, \`red_openai_acp.exe\`, and \`red_codex_acp.exe\`, and place them in a directory on your PATH.

          ## Checksums

          Download \`SHA256SUMS.txt\` from this release to verify archives.

          ## Full Changelog

          ${changelog_url}
          EOF
          } > RELEASE_NOTES.md

          {
            echo "tag_name=$tag"
            echo "version=$version"
            echo "prerelease_flag=$prerelease_flag"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          PRERELEASE_FLAG: ${{ steps.release.outputs.prerelease_flag }}
        run: |
          set -euo pipefail
          prerelease_args=()
          if [[ -n "$PRERELEASE_FLAG" ]]; then
            prerelease_args+=("$PRERELEASE_FLAG")
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --draft \
              --title "Red Editor ${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md \
              "${prerelease_args[@]}"
          else
            gh release create "$TAG_NAME" \
              --draft \
              --verify-tag \
              --title "Red Editor ${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md \
              "${prerelease_args[@]}"
          fi
          gh release upload "$TAG_NAME" dist/* --clobber

  homebrew:
    name: Update Homebrew tap
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    steps:
      - name: Check Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update codersauce/homebrew-tap." >&2
            exit 1
          fi

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --pattern "red-*.tar.gz" \
            --pattern "SHA256SUMS.txt" \
            --dir dist

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: codersauce/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          mkdir -p tap/Formula

          mac_arm_sha="$(grep 'red-aarch64-apple-darwin.tar.gz$' dist/SHA256SUMS.txt | awk '{print $1}')"
          mac_intel_sha="$(grep 'red-x86_64-apple-darwin.tar.gz$' dist/SHA256SUMS.txt | awk '{print $1}')"
          linux_sha="$(grep 'red-x86_64-unknown-linux-gnu.tar.gz$' dist/SHA256SUMS.txt | awk '{print $1}')"

          cat > tap/Formula/red.rb <<EOF
          class Red < Formula
            desc "Modern, modal text editor built in Rust"
            homepage "https://github.com/codersauce/red"
            version "${version}"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/codersauce/red/releases/download/${TAG_NAME}/red-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm_sha}"
              else
                url "https://github.com/codersauce/red/releases/download/${TAG_NAME}/red-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_intel_sha}"
              end
            elsif OS.linux?
              url "https://github.com/codersauce/red/releases/download/${TAG_NAME}/red-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${linux_sha}"
            end

            def install
              bin.install "red", "red_openai_acp", "red_codex_acp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/red --version")
              assert_match "red self-check ok", shell_output("#{bin}/red --self-check")
              assert_match version.to_s, shell_output("#{bin}/red_openai_acp --version")
              assert_match version.to_s, shell_output("#{bin}/red_codex_acp --version")
            end
          end
          EOF

      - name: Commit formula update
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/red.rb
          if git diff --cached --quiet; then
            echo "Formula/red.rb is already up to date."
            exit 0
          fi
          git commit -m "Update red to ${{ github.event.release.tag_name }}"
          git push
