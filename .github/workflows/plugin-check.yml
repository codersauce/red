name: Husk Plugin Check

on:
  push:
    paths:
      - '.github/workflows/plugin-check.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/husk*/**'
      - 'default_config.toml'
      - 'plugins/**'
      - 'src/assets.rs'
      - 'src/config.rs'
      - 'src/plugin/**'
      - 'src/self_check.rs'
  pull_request:
    paths:
      - '.github/workflows/plugin-check.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/husk*/**'
      - 'default_config.toml'
      - 'plugins/**'
      - 'src/assets.rs'
      - 'src/config.rs'
      - 'src/plugin/**'
      - 'src/self_check.rs'

jobs:
  bundled-plugins:
    name: Parse and initialize bundled Husk plugins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test the Husk runtime and plugin bridge
        run: cargo test --all-features husk

      - name: Initialize the bundled runtime
        run: cargo run --all-features -- --self-check
