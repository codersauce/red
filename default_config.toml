# "R" = "IncreaseLeft"
"v" = { EnterMode = "Visual" }
"V" = { EnterMode = "VisualLine" }
"Ctrl-v" = { EnterMode = "VisualBlock" }
"p" = "Paste"
"P" = "PasteBefore"

[keys.normal.">"]
