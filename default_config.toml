[keys.normal." "."d"]
"b" = "DumpBuffer"
"i" = "DumpDiagnostics"
"c" = "DumpCapabilities"
"h" = "DumpHistory"
"l" = "ViewLogs"
"p" = "ListPlugins"

[keys.normal."d"]
"d" = "DeleteCurrentLine"
"w" = "DeleteWord"

[keys.search]
Esc = { EnterMode = "Normal" }

[keys.command]
Esc = { EnterMode = "Normal" }

[keys.visual]
Esc = { EnterMode = "Normal" } 
"k" = "MoveUp"
"j" = "MoveDown"
"h" = "MoveLeft"
"l" = "MoveRight"
"$" = "MoveToLineEnd"
"End" = "MoveToLineEnd"
