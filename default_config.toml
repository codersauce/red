"$" = "MoveToLineEnd"
"End" = "MoveToLineEnd"

[keys.visual_line]
Esc = { EnterMode = "Normal" }

[commands]
"write" = "Save"
"quit" = "Quit"

[plugins]
barbecue = "barbecue.js"
buffer_picker = "buffer_picker.js"
cool_search = "cool_search.js"
fidget = "fidget.js"
indent_guides = "indent_guides.js"
inlay_hints = "inlay_hints.js"
lsp_symbols = "lsp_symbols.ts"
neotree = "neotree.js"
project_search = "project_search.js"
session_restore = "session_restore.js"
theme_browser = "theme_browser.js"

# Breadcrumbs use theme workbench colors and Nerd Font glyphs by default.
# Set nerd_font to false for a plain Unicode presentation.
[plugin_config.barbecue]
enabled = true
separator = ""
truncate_marker = "…"
show_directory = true
show_file = true
show_symbols = true
nerd_font = true

[plugin_config.barbecue.icons.overrides]
# class = "C"
# function = "fn"
# struct = ""

[plugin_permissions.project_search]
process = ["rg"]

# Symbol kind icons use Nerd Font glyphs matching the Snacks picker defaults.
# Set enabled to false to hide them. Override any lowercase LSP kind with a
# custom string; an empty string hides only that kind.
[plugin_config.lsp_symbols.icons]
enabled = true

[plugin_config.lsp_symbols.icons.overrides]
# class = "C"
# function = "fn"
# struct = ""
